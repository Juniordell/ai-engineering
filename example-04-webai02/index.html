<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AI Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🤖 Web AI Demo</h1>

        <form id="question-form">
            <div class="parameters">
                <div class="param-group">
                    <label for="temperature">Temperature: <span id="temp-value" class="value-display"></span></label>
                    <input type="range" id="temperature" name="temperature" step="0.1">
                    <div class="param-description">Controls the creativity of responses. Low values = more focused,
                        high values = more creative</div>
                </div>

                <div class="param-group">
                    <label for="topK">Top K: <span id="topk-value" class="value-display"></span></label>
                    <input type="number" id="topK" name="topK">
                    <div class="param-description">Limits the selection to the K most probable words. Lower values = more
                        predictable</div>
                </div>
            </div>

            <label for="question">Chat with it:</label>
            <textarea name="question" id="question" placeholder="Type your question here..."></textarea>

            <button type="submit" id="ask-button">Send</button>
        </form>

        <div id="output"></div>

        <footer class="copyright">
            Erick Wendel - Software Engineering with Applied AI - UNIPDS - <span id="year"></span>
        </footer>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
